<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChE Sports Competition</title>
    <link rel="preload" as="image" href="ใส่_URL_รูปภาพพื้นหลังที่นี่" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap");
      body {
        font-family: "Prompt", sans-serif;
      }
      .iframe-container iframe {
        width: 100% !important;
        border-radius: 0.5rem;
      }
      .hide-scroll::-webkit-scrollbar {
        display: none;
      }

  </head>
  <body class="bg-gray-100 text-gray-800">
    <div
      id="welcome-screen"
      style="
        background-image: url(&quot;https://i.postimg.cc/9XdMMfsJ/DSC07648.webp&quot;);

        background-position: center;

      <div class="text-center p-8 max-w-lg w-full z-10">
        <img
          src="https://i.postimg.cc/9XdMMfsJ/DSC07648.webp"
          alt="Logo"
          class="h-32 w-auto mx-auto mb-6 drop-shadow-lg"
        />
        <h1
          class="text-4xl md:text-5xl font-black mb-4 tracking-wide drop-shadow-md"
        >
          ChE Sports Competition
        </h1>
        <p
          class="text-blue-100 text-lg md:text-xl mb-10 font-light drop-shadow-sm"
        >
          ระบบประชาสัมพันธ์และติดตามผลการแข่งขัน
        </p>

        <div

          <button

            class="bg-yellow-500 hover:bg-yellow-400 text-blue-900 font-extrabold py-4 px-10 rounded-xl shadow-lg transform hover:-translate-y-1 transition-all duration-300 w-full md:w-auto text-lg flex items-center justify-center cursor-pointer order-1 md:order-1"
          >
            เข้าสู่เว็บไซต์ <i class="fas fa-arrow-right ml-3"></i>
          </button>

          <button
            onclick="
              window.location.href = 'mailto:plampawaritponampai@gmail.com'
            "
            class="bg-white/20 hover:bg-white/30 text-white font-bold py-4 px-10 rounded-xl backdrop-blur-sm border border-white/30 shadow-lg transform hover:-translate-y-1 transition-all duration-300 w-full md:w-auto text-lg flex items-center justify-center cursor-pointer order-2 md:order-2"
          >
            <i class="fas fa-envelope mr-3"></i> ติดต่อเรา
          </button>
        </div>
      </div>
    </div>

    <div class="flex h-screen overflow-hidden">
      <aside
        id="sidebar"
        class="bg-blue-800 text-white w-64 flex-shrink-0 flex flex-col transition-transform duration-300 transform -translate-x-full md:translate-x-0 fixed md:relative z-50 h-full inset-y-0 left-0 shadow-2xl"
      >
        <div
          class="p-6 border-b border-blue-700 flex justify-between items-center"
        >
          <h1 class="text-xl font-bold whitespace-nowrap">
            ChE Sports <br />
            Competition
            <i class="fas fa-trophy text-yellow-400 mr-2"></i>
          </h1>
          <button
            onclick="toggleSidebar()"
            class="md:hidden text-white hover:text-gray-300 focus:outline-none"
          >
            <i class="fas fa-times text-2xl"></i>
          </button>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 hide-scroll">
          <ul class="space-y-2 px-4">
            <li>
              <button
                onclick="navigate('announcement')"
                id="nav-announcement"
                class="w-full text-left px-4 py-3 rounded hover:bg-blue-700 transition"
              >
                <i class="fas fa-bullhorn w-6"></i> ประกาศ
              </button>
            </li>
            <li>
              <button
                onclick="navigate('students')"
                id="nav-students"
                class="w-full text-left px-4 py-3 rounded hover:bg-blue-700 transition"
              >
                <i class="fas fa-users w-6"></i> รายชื่อผู้เข้าร่วม
              </button>
            </li>
            <li>
              <button
                onclick="navigate('activities')"
                id="nav-activities"
                class="w-full text-left px-4 py-3 rounded hover:bg-blue-700 transition"
              >
                <i class="fas fa-running w-6"></i> ข้อมูลกิจกรรม
              </button>
            </li>
            <li>
              <button
                onclick="navigate('schedule')"
                id="nav-schedule"
                class="w-full text-left px-4 py-3 rounded hover:bg-blue-700 transition"
              >
                <i class="fas fa-calendar-alt w-6"></i> ตารางกิจกรรม
              </button>
            </li>
            <li>
              <button
                onclick="navigate('scoreboard')"
                id="nav-scoreboard"
                class="w-full text-left px-4 py-3 rounded hover:bg-blue-700 transition"
              >
                <i class="fas fa-medal w-6"></i> ผลการแข่งขัน
              </button>
            </li>
          </ul>
        </nav>
      </aside>

      <div class="flex-1 flex flex-col w-full">
        <header
          class="bg-white shadow-sm h-16 flex items-center px-4 md:hidden z-30 relative"
        >
          <button
            onclick="toggleSidebar()"
            class="text-gray-600 focus:outline-none"
          >
            <i class="fas fa-bars text-2xl"></i>
          </button>
          <h1 class="text-lg font-bold text-blue-800 ml-4">
            <i class="fas fa-trophy text-yellow-500 mr-1"></i> ChE Sports
            Competition
          </h1>
        </header>

        <main class="flex-1 overflow-y-auto p-4 md:p-8 bg-gray-100">
          <div id="page-announcement" class="page-section hidden">
            <h2
              class="text-2xl font-bold text-blue-800 border-l-4 border-blue-600 pl-3 mb-6"
            >
              ประกาศข่าวสาร
            </h2>
            <div id="announcement-container" class="space-y-4"></div>
          </div>

          <div id="page-students" class="page-section hidden">
            <h2
              class="text-2xl font-bold text-blue-800 border-l-4 border-blue-600 pl-3 mb-6"
            >
              รายชื่อผู้เข้าร่วมกิจกรรม
            </h2>

            <div
              class="bg-white p-4 rounded-lg shadow mb-6 grid grid-cols-1 md:grid-cols-4 gap-4"
            >
              <div>
                <label class="block text-sm text-gray-600 mb-1"
                  >ค้นหา (ID, ชื่อ, นามสกุล)</label
                >
                <input
                  type="text"
                  id="searchStudent"
                  oninput="renderStudents()"
                  placeholder="พิมพ์ข้อความ..."
                  class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                />
              </div>
              <div>
                <label class="block text-sm text-gray-600 mb-1">สถาบัน</label>
                <select
                  id="filterInst"
                  onchange="renderStudents()"
                  class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                ></select>
              </div>
              <div>
                <label class="block text-sm text-gray-600 mb-1">เพศ</label>
                <select
                  id="filterGender"
                  onchange="renderStudents()"
                  class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                ></select>
              </div>
              <div>
                <label class="block text-sm text-gray-600 mb-1"
                  >กิจกรรมที่เข้าร่วม</label
                >
                <select
                  id="filterActivity"
                  onchange="renderStudents()"
                  class="w-full border border-gray-300 rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
                ></select>
              </div>
            </div>

            <div class="bg-white rounded-lg shadow overflow-x-auto">
              <table class="w-full whitespace-nowrap">
                <thead class="bg-blue-50">
                  <tr class="text-left text-blue-800 text-sm font-semibold">
                    <th class="p-4 border-b">ID</th>
                    <th class="p-4 border-b">ชื่อ-นามสกุล</th>
                    <th class="p-4 border-b">สถาบัน</th>
                    <th class="p-4 border-b">เพศ</th>
                    <th class="p-4 border-b">กิจกรรม (Tags)</th>
                  </tr>
                </thead>
                <tbody
                  id="student-table-body"
                  class="text-gray-700 text-sm divide-y"
                ></tbody>
              </table>
            </div>
          </div>

          <div id="page-activities" class="page-section hidden">
            <h2
              class="text-2xl font-bold text-blue-800 border-l-4 border-blue-600 pl-3 mb-6"
            >
              รายละเอียดกิจกรรม
            </h2>
            <div
              id="activities-container"
              class="grid grid-cols-1 lg:grid-cols-2 gap-6"
            ></div>
          </div>

          <div id="page-schedule" class="page-section hidden">
            <h2
              class="text-2xl font-bold text-blue-800 border-l-4 border-blue-600 pl-3 mb-6"
            >
              ตารางกิจกรรม
            </h2>
            <div class="bg-white rounded-lg shadow overflow-x-auto">
              <table class="w-full whitespace-nowrap">
                <thead class="bg-blue-50">
                  <tr class="text-left text-blue-800 text-sm font-semibold">
                    <th class="p-4 border-b">วันที่ (Day)</th>
                    <th class="p-4 border-b">เวลา</th>
                    <th class="p-4 border-b">กิจกรรม</th>
                    <th class="p-4 border-b">สถานที่</th>
                  </tr>
                </thead>
                <tbody
                  id="schedule-table-body"
                  class="text-gray-700 text-sm divide-y"
                ></tbody>
              </table>
            </div>
          </div>

          <div id="page-scoreboard" class="page-section hidden">
            <h2
              class="text-2xl font-bold text-blue-800 border-l-4 border-blue-600 pl-3 mb-6"
            >
              ผลการแข่งขัน
            </h2>

            <div class="bg-white p-4 rounded-lg shadow mb-6">
              <label class="block text-sm text-gray-600 mb-1"
                >เลือกกิจกรรม</label
              >
              <select
                id="filterScoreActivity"
                onchange="renderScoreboard()"
                class="w-full md:w-1/3 border border-gray-300 rounded p-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
              ></select>
            </div>

            <div
              id="scoreboard-container"
              class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"
            ></div>
          </div>
        </main>
      </div>

      <div
        id="sidebar-backdrop"
        onclick="toggleSidebar()"
        class="fixed inset-0 bg-black bg-opacity-50 z-40 hidden md:hidden"
      ></div>
    </div>

    <script>
      // ==========================================
      // ตั้งค่า GAS URL ของคุณที่นี่ (สำคัญมาก)
      // ==========================================
      const GAS_URL =
        "https://script.google.com/macros/s/AKfycbyYtohLveOO8GtaNxcb7kxHvyN-02OdN8ihdDliJpnnAprPgPonOaj6_GEjCuVezeml/exec"; // วาง URL ของคุณที่นี่

      // ==========================================
      // ตัวแปรระบบ (State & Cache)
      // ==========================================
      const CACHE_KEY = "sports_app_data_v1";
      let appData = null;
      let isLoading = true;

      // ==========================================
      // จุดเริ่มต้นการทำงาน (Initialization)
      // ==========================================
      window.onload = () => {
        initApp();
      };

      async function initApp() {
        // 1. ลองดึงข้อมูลจากเครื่องผู้ใช้ (Local Storage) ก่อน
        const cachedData = localStorage.getItem(CACHE_KEY);

        if (cachedData) {
          // --- กรณีเคยเข้าเว็บแล้ว (มี Cache) ---
          appData = JSON.parse(cachedData);
          isLoading = false; // ปิด Skeleton ทันที
          setupFilters();

          // ปลดล็อคปุ่ม Welcome Screen ทันทีแบบไม่ต้องรอ
          enableWelcomeButton();

          // ถ้ายูสเซอร์อยู่ในหน้าเว็บแล้ว ให้เรนเดอร์ข้อมูลเก่าทันที
          if (
            document
              .getElementById("welcome-screen")
              .classList.contains("hidden")
          ) {
            refreshCurrentPage();
          }

          // 2. แอบดึงข้อมูลใหม่เบื้องหลังเพื่อเช็คอัปเดต
          fetchDataInBackground(false);
        } else {
          // --- กรณีเข้าเว็บครั้งแรก (ไม่มี Cache) ---
          // ต้องรอโหลดข้อมูลจาก Google Sheets
          fetchDataInBackground(true);
        }

        // 3. [สำคัญ] ตั้งเวลาดึงข้อมูลอัตโนมัติ (Auto-Refresh)
        // 60000 มิลลิวินาที = 1 นาที (ปรับตัวเลขได้ตามต้องการ)
        setInterval(() => {
          // จะดึงข้อมูลเบื้องหลังอัตโนมัติ เพื่อให้หน้าจออัปเดตเอง
          fetchDataInBackground(false);
        }, 60000);
      }

      // ==========================================
      // ฟังก์ชันจัดการปุ่มหน้า Welcome
      // ==========================================
      function enableWelcomeButton() {
        const enterBtn = document.getElementById("enter-btn");
        if (!enterBtn) return;
        enterBtn.disabled = false;
        // ปรับดีไซน์ปุ่มให้พร้อมกด (Corner Radius แบบ xl ที่เราคุยกันไว้)
        enterBtn.className =
          "bg-yellow-500 hover:bg-yellow-400 text-blue-900 font-extrabold py-4 px-10 rounded-xl shadow-lg transform hover:-translate-y-1 transition-all duration-300 w-full md:w-auto text-lg flex items-center justify-center mx-auto cursor-pointer order-1 md:order-1";
        enterBtn.innerHTML = `เข้าสู่เว็บไซต์ <i class="fas fa-arrow-right ml-3"></i>`;
      }

      function enterWebsite() {
        const welcomeScreen = document.getElementById("welcome-screen");
        welcomeScreen.style.opacity = "0";
        setTimeout(() => {
          welcomeScreen.classList.add("hidden");
          navigate("announcement");
        }, 700);
      }

      // ==========================================
      // ฟังก์ชันดึงข้อมูลเบื้องหลัง (Background Fetch)
      // ==========================================
      async function fetchDataInBackground(isFirstTime) {
        try {
          const response = await fetch(GAS_URL);
          if (!response.ok) throw new Error("Network response was not ok");

          const freshData = await response.json();

          // เซฟข้อมูลใหม่ทับลงไปใน Local Storage ทันที
          localStorage.setItem(CACHE_KEY, JSON.stringify(freshData));

          // อัปเดตตัวแปรหลัก
          appData = freshData;
          isLoading = false;

          // อัปเดต Dropdown ต่างๆ ให้เป็นข้อมูลล่าสุด
          setupFilters();

          if (isFirstTime) {
            // ถ้าเข้าครั้งแรก โหลดเสร็จแล้วค่อยปลดล็อคปุ่ม
            enableWelcomeButton();
          } else {
            // ถ้าดึงข้อมูลเบื้องหลังสำเร็จ ให้หน้าเว็บรีเฟรชตัวเองแบบเงียบๆ
            // ข้อมูลที่เปลี่ยนไป เช่น คะแนน หรือประกาศใหม่ จะเด้งขึ้นมาเอง
            refreshCurrentPage();
          }
        } catch (error) {
          console.error("Error fetching data:", error);
          if (isFirstTime) {
            const enterBtn = document.getElementById("enter-btn");
            enterBtn.className =
              "bg-red-100 text-red-600 font-bold py-4 px-10 rounded-xl w-full md:w-auto mx-auto order-1 md:order-1";
            enterBtn.innerHTML = `<i class="fas fa-exclamation-triangle mr-2"></i> โหลดไม่สำเร็จ กรุณารีเฟรช`;
          }
        }
      }

      // ==========================================
      // ฟังก์ชันรีเฟรชหน้าปัจจุบัน (เพื่อเอาข้อมูลใหม่มาโชว์)
      // ==========================================
      function refreshCurrentPage() {
        // เช็คว่ายูสเซอร์กำลังเปิดหน้าไหนอยู่ แล้วสั่งเรนเดอร์หน้านั้นใหม่
        if (
          !document
            .getElementById("page-announcement")
            .classList.contains("hidden")
        )
          renderAnnouncements();
        if (
          !document.getElementById("page-students").classList.contains("hidden")
        )
          renderStudents();
        if (
          !document
            .getElementById("page-activities")
            .classList.contains("hidden")
        )
          renderActivities();
        if (
          !document.getElementById("page-schedule").classList.contains("hidden")
        )
          renderSchedule();
        if (
          !document
            .getElementById("page-scoreboard")
            .classList.contains("hidden")
        )
          renderScoreboard();
      }

      // ================= SPA Routing =================
      function navigate(pageId) {
        // ซ่อนทุกหน้า
        document
          .querySelectorAll(".page-section")
          .forEach((el) => el.classList.add("hidden"));
        // แสดงหน้าที่เลือก
        document.getElementById(`page-${pageId}`).classList.remove("hidden");

        // อัปเดตสีของ Sidebar Menu
        document
          .querySelectorAll("aside nav button")
          .forEach((btn) =>
            btn.classList.remove("bg-blue-700", "font-semibold"),
          );
        document
          .getElementById(`nav-${pageId}`)
          .classList.add("bg-blue-700", "font-semibold");

        // Render ข้อมูลตามหน้า
        if (pageId === "announcement") renderAnnouncements();
        if (pageId === "students") renderStudents();
        if (pageId === "activities") renderActivities();
        if (pageId === "schedule") renderSchedule();
        if (pageId === "scoreboard") renderScoreboard();

        // ซ่อน Sidebar ในมือถือเมื่อกดเปลี่ยนหน้า
        if (window.innerWidth < 768) {
          document.getElementById("sidebar").classList.add("-translate-x-full");
          document.getElementById("sidebar-backdrop").classList.add("hidden");
        }
      }

      // ================= Hamburger Toggle =================
      function toggleSidebar() {
        const sidebar = document.getElementById("sidebar");
        const backdrop = document.getElementById("sidebar-backdrop");

        // สไลด์เมนูเข้า/ออก โดยการเพิ่ม-ลดคลาส -translate-x-full
        sidebar.classList.toggle("-translate-x-full");
        // แสดง/ซ่อน แถบสีดำพื้นหลัง
        backdrop.classList.toggle("hidden");
      }

      // ================= UI Renders =================

      // 1. ประกาศ (Announcements) พร้อมระบบ Skeleton Loading
      function renderAnnouncements() {
        const container = document.getElementById("announcement-container");

        // --- ถ้าระบบยังโหลดข้อมูลอยู่ ให้โชว์ Skeleton ---
        if (isLoading) {
          // สร้างกล่องจำลอง 3 กล่อง
          container.innerHTML = Array(3)
            .fill("")
            .map(
              () => `
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-gray-200 animate-pulse">
                        <div class="h-6 bg-gray-200 rounded-md w-1/3 mb-4"></div>
                        <div class="h-4 bg-gray-200 rounded-md w-full mb-2"></div>
                        <div class="h-4 bg-gray-200 rounded-md w-5/6"></div>
                    </div>
                `,
            )
            .join("");
          return; // หยุดการทำงานแค่นี้จนกว่าจะโหลดเสร็จ
        }

        // --- ถ้าโหลดเสร็จแล้ว ให้โชว์ข้อมูลจริง ---
        if (appData && appData.announcements.length > 0) {
          container.innerHTML = appData.announcements
            .map(
              (item) => `
                    <div class="bg-white p-6 rounded-lg shadow border-l-4 border-yellow-400 transform transition duration-500 hover:scale-[1.01]">
                        <h3 class="text-xl font-bold text-blue-800 mb-2">${item.topic}</h3>
                        <p class="text-gray-600 whitespace-pre-wrap">${item.detail}</p>
                    </div>
                `,
            )
            .join("");
        } else {
          container.innerHTML = `<p class="text-gray-500 text-center py-8">ยังไม่มีประกาศในขณะนี้</p>`;
        }
      }

      // ตั้งค่า Dropdown สำหรับตัวกรองหน้า Students และ Scoreboard
      function setupFilters() {
        // ดึงค่า Unique สำหรับ Dropdown นักเรียน
        const instSet = new Set(),
          genderSet = new Set(),
          activitySet = new Set();
        appData.students.forEach((s) => {
          if (s.institute) instSet.add(s.institute);
          if (s.gender) genderSet.add(s.gender);
          s.tags.forEach((t) => activitySet.add(t));
        });

        const createOptions = (set) =>
          `<option value="">-- ทั้งหมด --</option>` +
          Array.from(set)
            .map((val) => `<option value="${val}">${val}</option>`)
            .join("");

        document.getElementById("filterInst").innerHTML =
          createOptions(instSet);
        document.getElementById("filterGender").innerHTML =
          createOptions(genderSet);
        document.getElementById("filterActivity").innerHTML =
          createOptions(activitySet);

        // ตัวกรองกิจกรรมสำหรับหน้า Scoreboard
        const scoreActSet = new Set(
          appData.scoreboard.map((s) => s.activity).filter((x) => x),
        );
        document.getElementById("filterScoreActivity").innerHTML =
          createOptions(scoreActSet);
      }

      // 2. นักเรียน (Students) - พร้อม Skeleton
      function renderStudents() {
        const tbody = document.getElementById("student-table-body");

        // --- ถ้าระบบยังโหลดข้อมูลอยู่ ให้โชว์ Skeleton ของตาราง ---
        if (isLoading) {
          tbody.innerHTML = Array(5)
            .fill("")
            .map(
              () => `
                    <tr class="animate-pulse bg-white">
                        <td class="p-4"><div class="h-4 bg-gray-200 rounded w-12"></div></td>
                        <td class="p-4"><div class="h-4 bg-gray-200 rounded w-32 md:w-48"></div></td>
                        <td class="p-4"><div class="h-4 bg-gray-200 rounded w-16 md:w-24"></div></td>
                        <td class="p-4"><div class="h-4 bg-gray-200 rounded w-10"></div></td>
                        <td class="p-4"><div class="flex gap-2"><div class="h-6 bg-gray-200 rounded-full w-16"></div><div class="h-6 bg-gray-200 rounded-full w-12 hidden md:block"></div></div></td>
                    </tr>
                `,
            )
            .join("");
          return; // หยุดการทำงานแค่นี้จนกว่าจะโหลดเสร็จ
        }

        // --- โหลดข้อมูลเสร็จแล้ว ---
        if (!appData) return;

        const searchText = document
          .getElementById("searchStudent")
          .value.toLowerCase();
        const filterInst = String(document.getElementById("filterInst").value);
        const filterGender = String(
          document.getElementById("filterGender").value,
        );
        const filterActivity = String(
          document.getElementById("filterActivity").value,
        );

        const filteredData = appData.students.filter((s) => {
          const matchSearch =
            String(s.id).toLowerCase().includes(searchText) ||
            String(s.name).toLowerCase().includes(searchText) ||
            String(s.surname).toLowerCase().includes(searchText);
          const matchInst =
            filterInst === "" || String(s.institute) === filterInst;
          const matchGender =
            filterGender === "" || String(s.gender) === filterGender;
          const matchAct =
            filterActivity === "" || s.tags.includes(filterActivity);

          return matchSearch && matchInst && matchGender && matchAct;
        });

        tbody.innerHTML = filteredData
          .map(
            (s) => `
                <tr class="hover:bg-blue-50 transition">
                    <td class="p-4">${s.id}</td>
                    <td class="p-4 font-medium text-gray-900">${s.name} ${s.surname}</td>
                    <td class="p-4">${s.institute}</td>
                    <td class="p-4">${s.gender}</td>
                    <td class="p-4">
                        <div class="flex flex-wrap gap-1">
                            ${s.tags.map((tag) => `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded-full border border-blue-200">${tag}</span>`).join("")}
                        </div>
                    </td>
                </tr>
            `,
          )
          .join("");

        if (filteredData.length === 0) {
          tbody.innerHTML = `<tr><td colspan="5" class="p-4 text-center text-gray-500">ไม่พบข้อมูลที่ค้นหา</td></tr>`;
        }
      }

      // 3. กิจกรรม (Activities) - พร้อม Skeleton
      function renderActivities() {
        const container = document.getElementById("activities-container");

        if (isLoading) {
          // จำลองการ์ดกิจกรรม 4 ใบ
          container.innerHTML = Array(4)
            .fill("")
            .map(
              () => `
                    <div class="bg-white rounded-lg shadow overflow-hidden flex flex-col animate-pulse">
                        <div class="p-6 flex-1 space-y-4">
                            <div class="h-6 bg-gray-200 rounded w-1/2"></div>
                            <div class="h-4 bg-gray-200 rounded w-full"></div>
                            <div class="h-4 bg-gray-200 rounded w-5/6"></div>
                            <div class="space-y-2 pt-4">
                                <div class="h-4 bg-gray-200 rounded w-1/3"></div>
                                <div class="h-4 bg-gray-200 rounded w-1/4"></div>
                                <div class="h-4 bg-gray-200 rounded w-2/5"></div>
                            </div>
                        </div>
                        <div class="bg-gray-200 h-48 w-full mt-auto"></div>
                    </div>
                `,
            )
            .join("");
          return;
        }

        if (!appData) return;

        container.innerHTML = appData.activities
          .map(
            (act) => `
                <div class="bg-white rounded-lg shadow overflow-hidden flex flex-col transform transition duration-300 hover:shadow-lg">
                    <div class="p-6 flex-1">
                        <h3 class="text-xl font-bold text-blue-800 mb-3">${act.name}</h3>
                        <p class="text-gray-600 mb-4 whitespace-pre-wrap">${act.detail}</p>
                        <div class="space-y-2 text-sm text-gray-700">
                            <p><i class="far fa-calendar text-blue-500 w-5"></i> <strong>วันที่:</strong> ${act.date}</p>
                            <p><i class="far fa-clock text-blue-500 w-5"></i> <strong>เวลา:</strong> ${act.time}</p>
                            <p><i class="fas fa-map-marker-alt text-red-500 w-5"></i> <strong>สถานที่:</strong> ${act.location}</p>
                        </div>
                    </div>
                    ${
                      act.map && act.map.includes("<iframe")
                        ? `<div class="bg-gray-100 p-2 iframe-container h-48">${act.map}</div>`
                        : ""
                    }
                </div>
            `,
          )
          .join("");
      }

      // 4. ตารางกิจกรรม (Schedule) - Group by Day & Time
      function renderSchedule() {
        const pageContainer = document.getElementById("page-schedule");

        // ถ้าระบบยังโหลดข้อมูลอยู่ ให้โชว์ Skeleton
        if (isLoading) {
          pageContainer.innerHTML = `<h2 class="text-2xl font-bold text-blue-800 border-l-4 border-blue-600 pl-3 mb-6">ตารางกิจกรรม</h2>
                <div class="space-y-4 animate-pulse">
                    <div class="h-10 bg-gray-200 rounded-full w-48 mb-6"></div>
                    <div class="h-24 bg-white rounded-xl shadow-sm border border-gray-100"></div>
                    <div class="h-24 bg-white rounded-xl shadow-sm border border-gray-100"></div>
                </div>`;
          return;
        }

        pageContainer.innerHTML = `<h2 class="text-2xl font-bold text-blue-800 border-l-4 border-blue-600 pl-3 mb-6">ตารางกิจกรรม</h2>`;

        // Group ข้อมูลชั้นที่ 1: ตามวันที่
        const groupedByDay = appData.schedule.reduce((acc, item) => {
          const day = item.date || "ไม่ระบุวัน";
          if (!acc[day]) acc[day] = [];
          acc[day].push(item);
          return acc;
        }, {});

        const listWrapper = document.createElement("div");
        listWrapper.className = "space-y-10";

        // วนลูปตามวัน
        Object.keys(groupedByDay).forEach((day) => {
          // Group ข้อมูลชั้นที่ 2: ตามเวลา (ภายในวันนั้นๆ)
          const groupedByTime = groupedByDay[day].reduce((acc, item) => {
            const time = item.time || "ไม่ระบุเวลา";
            if (!acc[time]) acc[time] = [];
            acc[time].push(item);
            return acc;
          }, {});

          const daySection = document.createElement("div");
          daySection.innerHTML = `
                    <div class="flex items-center mb-6">
                        <div class="bg-blue-800 text-white px-6 py-2 rounded-full font-bold shadow-md">
                            <i class="far fa-calendar-check mr-2"></i> วันที่ ${day}
                        </div>
                        <div class="flex-1 h-px bg-blue-200 ml-4"></div>
                    </div>
                    
                    <div class="space-y-4 ml-4 md:ml-8 border-l-2 border-blue-100 pl-6 py-2">
                        <!-- วนลูปตามเวลา สร้าง 1 Container ต่อ 1 ช่วงเวลา -->
                        ${Object.keys(groupedByTime)
                          .map(
                            (time) => `
                            <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row md:items-start gap-4 md:gap-8 hover:shadow-md transition relative">
                                <!-- จุดวงกลมบนเส้น Timeline -->
                                <div class="absolute -left-[35px] top-6 w-4 h-4 bg-blue-500 rounded-full border-4 border-white shadow-sm hidden md:block"></div>
                                
                                <!-- เวลา (อยู่ฝั่งซ้าย) -->
                                <div class="text-blue-600 font-bold text-xl md:w-28 flex-shrink-0 md:pt-1">
                                    <i class="far fa-clock mr-1 text-blue-400"></i> ${time}
                                </div>
                                
                                <!-- รายการกิจกรรมทั้งหมดในเวลานี้ (อยู่ฝั่งขวา) -->
                                <div class="flex-1 space-y-4">
                                    ${groupedByTime[time]
                                      .map(
                                        (item, index) => `
                                        <div class="${index !== groupedByTime[time].length - 1 ? "border-b border-gray-100 pb-4" : ""}">
                                            <h4 class="text-gray-800 font-bold text-lg">${item.activity}</h4>
                                            
                                            ${
                                              item.location
                                                ? `
                                                <p class="text-gray-500 text-sm mt-2 flex items-start">
                                                    <i class="fas fa-map-marker-alt text-red-500 mt-1 mr-2 w-4 text-center"></i>
                                                    
                                                    <!-- เช็คว่ามี Link หรือไม่ ถ้ามีให้ทำเป็น <a> ถ้าไม่มีให้แสดง text ธรรมดา -->
                                                    ${
                                                      item.locationLink
                                                        ? `<a href="${item.locationLink}" target="_blank" class="text-blue-600 hover:text-blue-800 hover:underline font-medium transition duration-200 flex items-center">
                                                            ${item.location} <i class="fas fa-external-link-alt text-xs ml-2 opacity-70"></i>
                                                        </a>`
                                                        : `<span>${item.location}</span>`
                                                    }
                                                </p>
                                            `
                                                : ""
                                            }
                                        </div>
                                    `,
                                      )
                                      .join("")}
                                </div>
                            </div>
                        `,
                          )
                          .join("")}
                    </div>
                `;
          listWrapper.appendChild(daySection);
        });

        if (appData.schedule.length === 0) {
          listWrapper.innerHTML = `<p class="text-gray-500 text-center py-8">ยังไม่มีตารางกิจกรรมในขณะนี้</p>`;
        }

        pageContainer.appendChild(listWrapper);
      }

      // 5. ผลการแข่งขัน (Score Board) - พร้อม Skeleton
      function renderScoreboard() {
        const container = document.getElementById("scoreboard-container");

        if (isLoading) {
          // จำลองกล่องคะแนน 3 กล่อง
          container.innerHTML = Array(3)
            .fill("")
            .map(
              () => `
                    <div class="bg-white p-6 rounded-lg shadow text-center border-t-4 border-gray-200 flex flex-col justify-between animate-pulse">
                        <div class="flex flex-col items-center">
                            <div class="h-5 bg-gray-200 rounded w-16 mb-3"></div>
                            <div class="h-4 bg-gray-200 rounded w-32 mb-4"></div>
                        </div>
                        <div class="flex justify-between items-center w-full mt-2">
                            <div class="h-6 bg-gray-200 rounded w-1/4"></div>
                            <div class="px-4">
                                <div class="h-10 bg-gray-200 rounded w-20"></div>
                            </div>
                            <div class="h-6 bg-gray-200 rounded w-1/4"></div>
                        </div>
                    </div>
                `,
            )
            .join("");
          return;
        }

        if (!appData) return;

        const filterScoreActivity = String(
          document.getElementById("filterScoreActivity").value,
        );

        const filteredData = appData.scoreboard.filter(
          (s) =>
            filterScoreActivity === "" ||
            String(s.activity) === filterScoreActivity,
        );

        container.innerHTML = filteredData
          .map((s) => {
            let scores = s.score.split(":").map((x) => x.trim());
            let score1 = scores[0] || "-";
            let score2 = scores[1] || "-";

            return `
                <div class="bg-white p-6 rounded-lg shadow text-center border-t-4 border-blue-600 flex flex-col justify-between transform transition duration-300 hover:shadow-lg">
                    <div>
                        <span class="inline-block bg-gray-200 text-gray-700 text-xs px-2 py-1 rounded mb-3">รอบ: ${s.round}</span>
                        <h4 class="text-gray-500 text-sm mb-4">${s.activity}</h4>
                    </div>
                    <div class="flex justify-between items-center w-full">
                        <div class="flex-1 overflow-hidden">
                            <p class="font-bold text-lg text-gray-800 truncate" title="${s.team1}">${s.team1}</p>
                        </div>
                        <div class="px-2 md:px-4 shrink-0">
                            <div class="bg-blue-800 text-white font-black text-xl md:text-2xl px-3 py-2 md:px-4 rounded shadow-inner flex items-center gap-1 md:gap-2 tracking-widest">
                                <span>${score1}</span> <span class="text-blue-300 text-base md:text-lg">:</span> <span>${score2}</span>
                            </div>
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <p class="font-bold text-lg text-gray-800 truncate" title="${s.team2}">${s.team2}</p>
                        </div>
                    </div>
                </div>
                `;
          })
          .join("");

        if (filteredData.length === 0) {
          container.innerHTML = `<p class="col-span-full text-center text-gray-500 mt-8">ไม่พบข้อมูลผลการแข่งขัน</p>`;
        }
      }
    </script>
  </body>
</html>
